<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="overlay"></div>

    <div class="login-box">
        <h1>Students Login</h1>

        <form>
            <div class="input-box">
                <input type="text" placeholder="Username" required>
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password" required>
            </div>

            <div class="options">
                <label><input type="checkbox"> Remember Me</label>
                <a href="#">Forgot Password?</a>
            </div>

            <button onclick="studentdashboard()" style="background: #030303; color: white;">Log in</button>

            <p class="register" style="color: #030303;">
                Don't have an account? <a href="student_register.html">Register</a>
            </p>
        </form>
    </div>
    <script>
        function studentdashboard() {
            window.location.href = "student_dashboard.html";
        }
    </script>

</body>
</html>
