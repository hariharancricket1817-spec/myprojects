<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration</title>
</head>
<body>

<h2>Student Registration</h2>

<form id="regForm">

    <input type="text" id="name" placeholder="Full Name" required><br><br>
    <input type="text" id="reg_no" placeholder="Register Number" required><br><br>
    <input type="text" id="roll_no" placeholder="Roll Number" required><br><br>
    <input type="email" id="email" placeholder="Email ID" required><br><br>
    <input type="text" id="class" placeholder="Class / Standard" required><br><br>
    <input type="text" id="degree" placeholder="Degree" required><br><br>
    <input type="text" id="department" placeholder="Department" required><br><br>
    <input type="text" id="hod_name" placeholder="HOD Name" required><br><br>
    <input type="text" id="advisor_name" placeholder="Class Advisor Name" required><br><br>
    <input type="tel" id="phone" placeholder="Phone Number" required><br><br>

    <input type="text" id="username" placeholder="Username" required><br><br>
    <input type="password" id="pass" placeholder="Password" required><br><br>
    <input type="password" id="repass" placeholder="Re-enter Password" required><br><br>

    <button type="button" onclick="studentRegister()">Register</button>

</form>

<script src="backend_connection.js"></script>

</body>
</html>
